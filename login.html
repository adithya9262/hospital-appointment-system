<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login or Register to SmartCare Hospital Appointment System">
  <title>Login - SmartCare</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-page {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, var(--primary-lighter) 0%, #fff 100%);
      padding: 2rem;
    }
    .login-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-xl);
      animation: fadeInUp 0.6s ease-out;
    }
    .login-card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-card-header .login-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      font-size: 1.8rem;
      color: #fff;
      box-shadow: var(--shadow-primary);
    }
    .login-card-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .login-card-header p {
      font-size: 0.88rem;
      color: var(--text-muted);
    }
    .login-tabs {
      display: flex;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 1.5rem;
    }
    .login-tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: inherit;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .login-tab-btn.active {
      background: #fff;
      color: var(--primary);
      font-weight: 600;
      box-shadow: var(--shadow);
    }
    .login-form { display: none; }
    .login-form.active { display: block; animation: fadeIn 0.3s ease; }
    .login-form .form-group { margin-bottom: 1rem; text-align: left; }
    .login-form .form-group input { width: 100%; }
    .login-form .btn { width: 100%; justify-content: center; padding: 13px; font-size: 0.95rem; margin-top: 0.5rem; }
    .login-error { color: var(--danger); font-size: 0.82rem; font-weight: 500; margin-top: 0.8rem; display: none; text-align: center; }
    .login-divider {
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-light);
      font-size: 0.82rem;
      position: relative;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .login-divider::before { left: 0; }
    .login-divider::after { right: 0; }
    .admin-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .admin-link a {
      color: var(--primary);
      font-weight: 600;
    }
    .admin-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">+</div>
        <span>SmartCare</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="doctors.html">Our Doctors</a>
        <a href="patient.html">Patient</a>
        <a href="admin.html">Admin</a>
        <a href="login.html" class="nav-login-btn active">Login</a>
      </div>
      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Login Page -->
  <div class="login-page">
    <div class="login-card">
      <div class="login-card-header">
        <div class="login-logo">+</div>
        <h2>Welcome to SmartCare</h2>
        <p>Login or create an account to manage your appointments</p>
      </div>

      <!-- Tabs -->
      <div class="login-tabs">
        <button class="login-tab-btn active" onclick="switchLoginTab('login')" id="loginTabBtn">🔑 Login</button>
        <button class="login-tab-btn" onclick="switchLoginTab('register')" id="registerTabBtn">📝 Register</button>
      </div>

      <!-- Login Form -->
      <form class="login-form active" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPass">Password</label>
          <input type="password" id="loginPass" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Login</button>
        <p class="login-error" id="loginError">Invalid email or password. Please try again.</p>
      </form>

      <!-- Register Form -->
      <form class="login-form" id="registerForm">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="regPhone">Phone Number</label>
          <input type="tel" id="regPhone" placeholder="+1 (555) 000-0000" required>
        </div>
        <div class="form-group">
          <label for="regPass">Password</label>
          <input type="password" id="regPass" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="registerSubmitBtn">Create Account</button>
      </form>

      <div class="login-divider">or</div>
      <p class="admin-link">Admin? <a href="admin.html">Login to Admin Dashboard →</a></p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function switchLoginTab(tab) {
      document.querySelectorAll('.login-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.getElementById('loginTabBtn').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.getElementById('registerTabBtn').classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value.trim();
      if (!email || !pass) { showToast('Please fill in all fields', 'error'); return; }
      // Demo: accept any login
      sessionStorage.setItem('patientLoggedIn', 'true');
      sessionStorage.setItem('patientEmail', email);
      showToast('Login successful! Welcome back.', 'success');
      setTimeout(() => { window.location.href = 'patient.html'; }, 800);
    });

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const pass = document.getElementById('regPass').value.trim();
      if (!name || !email || !phone || !pass) { showToast('Please fill in all fields', 'error'); return; }
      const patients = getPatients();
      if (!patients.includes(name)) { patients.push(name); savePatients(patients); }
      sessionStorage.setItem('patientLoggedIn', 'true');
      sessionStorage.setItem('patientEmail', email);
      sessionStorage.setItem('patientName', name);
      showToast('Account created successfully!', 'success');
      setTimeout(() => { window.location.href = 'patient.html'; }, 800);
    });
  </script>
</body>
</html>
